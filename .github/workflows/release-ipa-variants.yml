name: Build and release IPA variants

on:
  workflow_dispatch:
    inputs:
      apollo_ipa_url:
        description: 'Direct URL to a decrypted Apollo IPA or prepared Apollo base IPA'
        required: true
        type: string
        default: 'https://downloads.apolloreborn.app/apollobase.ipa'
      prerelease:
        description: 'Mark GitHub release as prerelease'
        required: false
        default: false
        type: boolean
      draft:
        description: 'Create the GitHub release as a draft'
        required: false
        default: true
        type: boolean
      update_sources:
        description: 'Regenerate apps.json source files and push them back to main'
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build four IPA variants
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: brew install ldid dpkg make

      - name: Add GNU make to PATH
        run: echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Build rootful tweak package
        run: make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Install cyan
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --pre cyan

      - name: Download Apollo IPA
        run: |
          curl -L --fail --retry 3 "${{ github.event.inputs.apollo_ipa_url }}" -o Apollo.ipa
          unzip -t Apollo.ipa >/dev/null

      - name: Build IPA variants
        run: bash ./scripts/build_release_variants.sh --ipa ./Apollo.ipa --output-dir ./dist/out

      - name: Collect metadata
        id: meta
        run: |
          APOLLO_VERSION=$(unzip -p Apollo.ipa 'Payload/*.app/Info.plist' | grep -A1 'CFBundleShortVersionString' | grep string | sed -E 's/.*<string>([^<]+)<\/string>.*/\1/' | tr -d '[:space:]')
          TWEAK_VERSION=$(sed -n 's/^Version: //p' control | sed 's/~/-/g')
          TAG_NAME="v${APOLLO_VERSION}_${TWEAK_VERSION}"
          RELEASE_NAME="Apollo v${APOLLO_VERSION} with Apollo-Reborn v${TWEAK_VERSION}"
          echo "apollo_version=${APOLLO_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tweak_version=${TWEAK_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md <<EOF
          Apollo version: \`v${{ steps.meta.outputs.apollo_version }}\`
          Apollo-Reborn version: \`v${{ steps.meta.outputs.tweak_version }}\`

          ## Included IPA variants

          - Standard injected IPA
          - No Extensions injected IPA
          - Standard injected IPA + Liquid Glass patch
          - No Extensions injected IPA + Liquid Glass patch

          ## Variant notes

          - **No Extensions** removes Apollo's bundled app extensions so the sideloaded app uses 1 App ID instead of 7.
          - **GLASS** applies the iOS 26 Liquid Glass binary patch and installs the bundled Liquid Glass icon catalog from this repo.
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          body_path: RELEASE_NOTES.md
          draft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: |
            dist/out/*.ipa

      - name: Update source JSON files
        if: github.event.inputs.update_sources == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 ./scripts/update_source_json.py

      - name: Commit updated source JSON files
        if: github.event.inputs.update_sources == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add apps.json apps_noext.json apps_glass.json apps_noext_glass.json
          if git diff --cached --quiet; then
            echo "No source JSON changes to commit."
            exit 0
          fi
          git commit -m "Update distribution sources for ${{ steps.meta.outputs.tag_name }}"
          git push
